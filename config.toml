[params.summary]
enable = true
text = """
I'm a software developer with professional experience in __Python__ and __JavaScript/Node.js__, particularly on the backend side of web development, with a proven track record on delivering cloud-native solutions from the drawing board to production.

I'm a detail-oriented perfectionist, but also versatile and constantly looking for new challenges. I enjoy working with __Django__ (who doesn't? ), but I'm always open to learning new technologies. Additionally, I'm quite proficient in administering __Linux__ systems, which I've been using in some form or another since I was a kid.

In my spare time, I especially enjoy engaging in various music-related activities, such as playing bass guitar with [my friends](https://www.instagram.com/lefogliemusic/).
"""

