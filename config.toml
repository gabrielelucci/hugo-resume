- "[Povertà educativa](https://www.openpolis.it/poverta-educativa/)": Adapted the existing architecture to track and analyze the socio-economic conditions of minors in Italy.
- "[A schede scoperte](https://www.openpolis.it/schede-scoperte-politiche-2018/)": Created a Django and React application to promote transparency during the 2018 Italian general elections.
